[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# Deselect runner-sensitive perf benchmarks by default. The CI gate
# in .github/workflows/test.yml runs plain `pytest` (no -m override),
# so anything marked `slow` does NOT block PRs. Run locally with
# `pytest -m slow` (or `-m "slow or not slow"` to include both) when
# you want to exercise the wall-clock budgets.
addopts = -m "not slow"
markers =
    slow: runner-sensitive perf benchmarks (deselected by default; not a CI gate)
