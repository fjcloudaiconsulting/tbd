name: Test

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Run backend syntax smoke
        run: python -m compileall backend/app

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check design tokens
        working-directory: frontend
        run: bash scripts/check-design-tokens.sh

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint -- --quiet

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Run frontend production build
        working-directory: frontend
        run: npm run build

      - name: Run apex static export build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BUILD_TARGET: apex
          NEXT_PUBLIC_SITE_URL: https://thebetterdecision.com
          NEXT_PUBLIC_APP_URL: https://app.thebetterdecision.com
        run: |
          npm run build:apex
          # Belt-and-suspenders sanity: the build script's own trap should
          # have already cleared out-apex/ failures, but verify the
          # entry points landed before signaling green to the PR.
          test -f out-apex/index.html
          test -f out-apex/_meta.json
