name: Test

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend pytest is sharded across N parallel groups via pytest-split.
  # Each shard runs a deterministic, duration-balanced slice of the suite
  # using the recorded backend/.test_durations file, so wall-clock per
  # shard stays well under the 3-minute target even as the suite grows.
  # See specs/ci-test-sharding.md for the rationale and the audit.
  #
  # The suite is self-contained: tests use in-process aiosqlite + a fake
  # Redis (see backend/tests/conftest.py), so shards need NO MySQL/Redis
  # service containers — each runner just pip-installs and runs its slice.
  #
  # The allowlist regression (tests/auth/test_sessions_invalidated_at_allowlist.py)
  # AST-scans backend/app/ source, not test files, so it works correctly in
  # whichever single shard pytest-split assigns it to — no replication needed.
  backend-shard:
    name: Backend Shard ${{ matrix.group }}/4
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run backend tests (shard ${{ matrix.group }}/4)
        working-directory: backend
        run: pytest --splits 4 --group ${{ matrix.group }} --durations-path .test_durations

      - name: Run backend syntax smoke
        if: ${{ matrix.group == 1 }}
        run: python -m compileall backend/app

  # Stable aggregate gate. Branch protection / required-check config can
  # point at this single "Backend Checks" context; it passes only when
  # every shard passed. Keeping the name "Backend Checks" preserves the
  # pre-sharding status-check semantics even though the work now fans out.
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    needs: backend-shard
    if: ${{ always() }}
    steps:
      - name: Verify all backend shards passed
        run: |
          if [ "${{ needs.backend-shard.result }}" != "success" ]; then
            echo "One or more backend shards failed: ${{ needs.backend-shard.result }}"
            exit 1
          fi
          echo "All backend shards passed."

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check design tokens
        working-directory: frontend
        run: bash scripts/check-design-tokens.sh

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint -- --quiet

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Run frontend production build
        working-directory: frontend
        run: npm run build

      - name: Run apex static export build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BUILD_TARGET: apex
          NEXT_PUBLIC_SITE_URL: https://thebetterdecision.com
          NEXT_PUBLIC_APP_URL: https://app.thebetterdecision.com
        run: |
          npm run build:apex
          # Belt-and-suspenders sanity: the build script's own trap should
          # have already cleared out-apex/ failures, but verify the
          # entry points landed before signaling green to the PR.
          test -f out-apex/index.html
          test -f out-apex/_meta.json
