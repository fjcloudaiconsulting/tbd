name: pfv
region: ams
# After running `infra/terraform apply`, set this to
# `terraform -chdir=infra/terraform output -raw vpc_id` and uncomment.
# Required for App Platform -> droplet private-IP connectivity once
# DATABASE_URL / REDIS_URL point at the droplet's 10.42.x.x address.
# Without it, the app cannot reach the droplet's private interface even
# if the cloud firewall allows the VPC CIDR.
# See https://docs.digitalocean.com/products/app-platform/how-to/enable-vpc/
# Push the spec via `doctl apps update <APP_ID> --spec .do/app.yaml`
# (NOT via the GH Action — see reference_do_spec_sync.md).
vpc:
  id: 694e9d40-a08d-486a-becb-5d068e5ef5c5
# Custom domain MUST stay declared here. With `app_spec_location` driving
# every deploy, anything missing from this file is removed from the live
# app on push — same failure mode as missing SECRET envs. Stripping the
# domain breaks Cloudflare's origin TLS handshake and takes the public
# site down even when the components are healthy (we hit that on the
# 2026-04-25 PR #89 merge).
domains:
  - domain: app.thebetterdecision.com
    type: PRIMARY
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: backend
        preserve_path_prefix: true
    - match:
        path:
          prefix: /health
      component:
        name: backend
        preserve_path_prefix: true
    - match:
        path:
          prefix: /ready
      component:
        name: backend
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: frontend

# ---------------------------------------------------------------------------
# About the encrypted `EV[...]` secret values below
#
# App Platform encrypts SECRET-typed env values with this app's per-app key
# the moment they're saved (via console or `doctl apps update --spec`) and
# thereafter only ever surfaces the encrypted blob — even `doctl apps spec
# get` returns the `EV[...]` form, never plaintext. The blob is unreadable
# outside DO and is safe to commit.
#
# We MUST commit them here because the deploy workflow now uses
# `app_spec_location: .do/app.yaml` to push this file as the authoritative
# spec on every deploy: any SECRET that is not listed here will be removed
# from the live app on the next deploy. (We hit that exact failure mode on
# 2026-04-25 — JWT_SECRET_KEY dropped to its placeholder default and the
# backend crashlooped on import.)
#
# To re-issue from scratch (new app, rotated app key), run
#   doctl apps spec get <app-id> --format yaml
# and copy the fresh `value: EV[...]` blocks back here.
# ---------------------------------------------------------------------------

services:
  - name: backend
    github:
      repo: fjcloudaiconsulting/tbd
      branch: main
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: APP_ENV
        scope: RUN_AND_BUILD_TIME
        value: "production"
      - key: APP_NAME
        scope: RUN_AND_BUILD_TIME
        value: "The Better Decision"
      - key: LOG_LEVEL
        scope: RUN_AND_BUILD_TIME
        value: "INFO"
      - key: APP_URL
        scope: RUN_AND_BUILD_TIME
        value: "https://app.thebetterdecision.com"
      - key: BACKEND_CORS_ORIGINS
        scope: RUN_AND_BUILD_TIME
        # apex origins added 2026-06-22 so the static landing page can fetch
        # the public founder-count endpoint cross-origin (W1b).
        value: "https://app.thebetterdecision.com,https://thebetterdecision.com,https://www.thebetterdecision.com"
      # Usernames excluded from the public founder count. MUST match the
      # production smoke account (CI secret SMOKE_USERNAME) + any seed
      # accounts, or the advertised count is inflated. Operator: confirm
      # this equals secrets.SMOKE_USERNAME.
      - key: FOUNDER_COUNT_EXCLUDE_USERNAMES
        scope: RUN_AND_BUILD_TIME
        value: "pfv_smoke_l05"
      - key: COOKIE_SECURE
        scope: RUN_AND_BUILD_TIME
        value: "true"
      - key: MAILGUN_DOMAIN
        scope: RUN_AND_BUILD_TIME
        value: "m.thebetterdecision.com"
      - key: MAILGUN_REGION
        scope: RUN_AND_BUILD_TIME
        value: "eu"
      - key: EMAIL_FROM
        scope: RUN_AND_BUILD_TIME
        value: "The Better Decision <noreply@m.thebetterdecision.com>"
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:niaLqbiSPh1dsD/z5fDHdZ9ELQIj/Zn0:dKdndRZkqkvQw6/T7jzR2TagmSphELkbf1u5Jb+Bcb5KRm2pQUC/doIw7oB0IMWCLUPo9MbuBw7FznNM21g/OBW1a/Mcq0ySDzbf6J8pSwqT76J0Xw+2FN+yObaldtru26H4MVgqtoyKqZTyug==]
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:yVJeJV1w+bxs3ZuWPQ1A7J1HTmvpBIZL:zeU+3P19VEfGrR0dwmskJqhw5ieNzQMdS6moOtaw6UIhPJGgGKYsM06GM/mrY2gbngsC771r88KRCeYvgws/jiUT+gkOBWR6jHyr6eExDaR0r/RsbMYsI9c5]
      - key: JWT_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:yu+iyIxbSwoJpe7aEGuEBSJ8judQo26F:Ogb2sdGetlKniX5UaHeObIhPiYej4c4W1fccXr1By5mIGy1LI4dn8R6NPR1CGfnUAo5fslDt7qV48MNdMnGwk1A9qlp8GxCcKD2fdYcm7f8=]
      - key: MFA_ENCRYPTION_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:ggw+koUI35JWzQb6g8N8GJ/psPs70qhS:e7BxGsGJdq35DlsFdA1CfTJrUFPwMa8kJDm5dQJkWNB2+vlwy3nkwEmdRnaYpy3DMurH67d7yKFsc1Z5]
      # AI tier (PR1) — Fernet key for per-org provider API keys at rest.
      # Operator action required before deploy: generate a NEW Fernet key
      # via `python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"`
      # and DOSC-encrypt it into the EV[] blob below. MUST NOT equal
      # MFA_ENCRYPTION_KEY — lifespan KEK guard refuses to boot.
      - key: AI_CREDENTIAL_ENCRYPTION_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:Nysd1FwUmJSXbnetxU9r4N3A/2g8UsUj:d+gKpNSU/amIC1dHSEigq5D3jMkXQDmwT+uAqAs+S9khODsKnVZZ94AsUKtE+QX64s7qNkySZhfrHfyq]
      - key: AI_CREDENTIAL_ENCRYPTION_KEY_PREV
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:fXl3Y39U5+b7Z+W/1sgSyN+Upqp5aNbr:sDEMJveK356wpnloAbmK3e+OMKCIW/Lo3Wo4JcWLQHHzxR4YFpQzKEcfiVcWS8L23cik0TT1MnoeAkEZ]
      - key: AI_NATIVE_ENABLED
        scope: RUN_AND_BUILD_TIME
        value: "false"
      # Wall-clock ceiling on a single AI dispatch adapter ATTEMPT (the
      # structured path retries up to 3x, so worst case ~90 s, still under
      # DO/Cloudflare's 100 s origin ceiling). The 5 s code default was too
      # tight for a real structured-output completion (every attempt timed
      # out); 30 s restores AI features while still bounding a hung provider.
      - key: AI_DISPATCH_TIMEOUT_S
        scope: RUN_AND_BUILD_TIME
        value: "30"
      # Pinned ToS version. Bump to force every org to re-consent on
      # the next admin-UI mount. Existing rows are never auto-upgraded.
      - key: AI_NATIVE_CURRENT_CONSENT_VERSION
        scope: RUN_AND_BUILD_TIME
        value: "ai-tos-2026-05-22"
      - key: MAILGUN_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:YrGhlsSeOARimCuO/Ws+dktoGW5NdFGD:wlcljc+wVhxlddlau+C6+r6EKYHgeVJPgd/i8rQS+gh+scfsqz5g8D1b+TJHwR6CvhbXKGeasrpgUJa/r/rsF48w]
      # Mailgun HTTP webhook signing key — distinct from MAILGUN_API_KEY. HMAC-
      # verifies inbound POST /api/v1/webhooks/mailgun delivery events. Unset =
      # endpoint fails closed (404) and no delivery status is recorded, so this
      # MUST stay here as an EV[] blob: .do/app.yaml is the authoritative spec on
      # every deploy, and an empty/missing value would strip the console-set
      # secret on the next push (see reference_do_spec_sync.md). Set via the DO
      # console 2026-07-21; blob pulled with `doctl apps spec get`.
      - key: MAILGUN_WEBHOOK_SIGNING_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:zlwc+YhAw3a8Ii8g/YAsE1M6ogOEQvcS:2LPx2QSfINnwZFbw75yD3w50oqU0Yi/TqqPL93heBSV2caaKtbkzSf/vm6sV4kv0N5LsCh1EslyxwcIc3epXo/nL]
      - key: GOOGLE_CLIENT_ID
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:cm+BD5dShSJwOjWL6YP2bSTVBZoT6u0W:t9oLM3W4BX6xhaUeU6zco2OrPU7enUX1EiYLDi/+yO9WC/8cfcutDlnARlQ8cd1wNsW3JMYj5rr1gHRE+VFpFL7YOph3eznAh1O3Q67jXvAi6pPt/Ok8Ug==]
      - key: GOOGLE_CLIENT_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:0/mRRuaUvDyJhFpbWK3g+TsqoYrBID+l:sddkvCmWoQSm6qU7/b9Q3QCWTFFWJ5i2Oj9nSOv6tyVlM7CQe0jC22lgJxKPq+pgJUlI]
      # PFV_RUNTIME=app_platform tells get_client_ip in backend/app/rate_limit.py
      # to consult the `do-connecting-ip` header (DO ingress writes the real
      # client IP there) instead of falling back to the DO ingress peer IP.
      # Without this var, audit_events.ip_address records the DO ingress IP,
      # not the user's IP. See PR #233 and project_audit_log_client_ip_bug.md.
      - key: PFV_RUNTIME
        scope: RUN_AND_BUILD_TIME
        value: "app_platform"
      # CAPTCHA gate on /api/v1/auth/register. Turnstile-by-default. Flip
      # CAPTCHA_REQUIRED to "false" as the rollback path during a provider
      # outage — the same value is exposed via /api/v1/auth/status so the
      # frontend stops rendering the widget on the next page load. The
      # secret below is the Cloudflare Turnstile siteverify secret; rotate
      # via the Cloudflare dashboard, then re-encrypt here.
      #
      # SHIPPING AS "false" UNTIL CLOUDFLARE SETUP IS DONE. With the secret
      # + site key still empty, "true" would fail-closed every register
      # attempt with REASON_MISCONFIGURED. Flip back to "true" in the same
      # commit that lands the real site key and encrypted CAPTCHA_SECRET
      # EV[] blob below, then redeploy.
      - key: CAPTCHA_REQUIRED
        scope: RUN_AND_BUILD_TIME
        value: "true"
      - key: CAPTCHA_PROVIDER
        scope: RUN_AND_BUILD_TIME
        value: "turnstile"
      - key: CAPTCHA_VERIFY_URL
        scope: RUN_AND_BUILD_TIME
        value: "https://challenges.cloudflare.com/turnstile/v0/siteverify"
      - key: CAPTCHA_VERIFY_TIMEOUT_S
        scope: RUN_AND_BUILD_TIME
        value: "5"
      - key: CAPTCHA_EXPECTED_HOSTNAME
        scope: RUN_AND_BUILD_TIME
        value: "app.thebetterdecision.com"
      - key: CAPTCHA_EXPECTED_ACTION
        scope: RUN_AND_BUILD_TIME
        value: "register"
      # CAPTCHA_SECRET — Cloudflare Turnstile siteverify secret.
      #
      # The value MUST land here as an encrypted EV[] blob, not be left
      # empty after a console-only update. .do/app.yaml is the authoritative
      # spec on every `doctl apps update --spec` and on the GitHub Actions
      # deploy; an empty value here will overwrite whatever was set via the
      # DO console on the next deploy. See reference_do_spec_sync.md.
      #
      # Setup flow:
      #   1. Create the Turnstile widget at https://dash.cloudflare.com/?to=/:account/turnstile
      #      for app.thebetterdecision.com. Copy the site key into the
      #      NEXT_PUBLIC_CAPTCHA_SITE_KEY value below.
      #   2. Add the Turnstile secret via the DO console (this app's
      #      Settings → App-Level Environment Variables → backend service).
      #      Save — DO encrypts it server-side.
      #   3. `doctl apps spec get <app-id> --format yaml` and copy the
      #      fresh `value: EV[...]` blob for CAPTCHA_SECRET into this
      #      file, replacing the empty value below.
      #   4. Flip CAPTCHA_REQUIRED above to "true" in the same commit.
      #   5. Push → deploy.
      - key: CAPTCHA_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "EV[1:kg3PgeHFB8F1J+W7poJvWA4BzRWZPNMx:UUM6Ver7hx8Zi4WfpqbjfWo3+t3KeTKMLOsUooHpBSe+3AvIe+eyHGBIvtdh7/TQdyZ/]"
      # Billing UI kill switch. SHIPPING AS "false" until the payment
      # platform is wired — hides the customer-facing trial banner,
      # settings Billing tab, and /settings/billing plan grid. Admin and
      # operator views are unaffected. Exposed via /api/v1/auth/status so
      # a flip to "true" restores the surface on the next page load.
      - key: BILLING_UI_ENABLED
        scope: RUN_AND_BUILD_TIME
        value: "false"
      # Reports v2 substrate. SHIPPING AS "false" through PRs 1 to 3 —
      # backend AST + canvas + widgets land inert behind this flag. The
      # router-level dependency raises 404 on every /api/v1/reports/*
      # route while the flag is false. Flip to "true" in PR 4 once the
      # frontend nav + templates + sharing land. See
      # specs/2026-05-22-reports-v2-flexible-canvas.md §11.
      - key: FEATURE_REPORTS_V2
        scope: RUN_AND_BUILD_TIME
        value: "true"

      # Plans (life-event scenario simulator) gate — env floor only.
      # "false" disables Plans globally (nav + /plans route + the
      # /api/v1/scenarios/* API all gate off). This is intentional: Plans
      # is being parked until its rethink lands. The gate still resolves
      # per-org override -> global system_settings default -> this floor,
      # so a superadmin re-enables Plans for a specific org (or globally)
      # at runtime from /system/features and the org admin page — no
      # redeploy. NOTE: shipping this flips Plans OFF for every org on
      # deploy; set a per-org override to keep demo access.
      - key: FEATURE_PLANS
        scope: RUN_AND_BUILD_TIME
        value: "false"

      # Custom Dashboard (W4 customizable dashboard) gate — env floor.
      # "true" enables the customizable dashboard globally. The gate still
      # resolves per-org override -> global system_settings default -> this
      # floor, so a superadmin rolls back a specific org (or globally) at
      # runtime from /system/features or the org "Feature Access" card by
      # setting the override to "off" — no redeploy. LegacyDashboard is kept
      # in the frontend as the off-path fallback.
      - key: FEATURE_CUSTOM_DASHBOARD
        scope: RUN_AND_BUILD_TIME
        value: "true"

  - name: frontend
    github:
      repo: fjcloudaiconsulting/tbd
      branch: main
      deploy_on_push: false
    source_dir: frontend
    dockerfile_path: frontend/Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    # The probe hits frontend:3000/health directly (not via the ingress) so
    # the /health prefix being routed to backend at the ingress layer is
    # irrelevant here. app/health/route.ts returns 200 once Next.js is up.
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: HOSTNAME
        scope: RUN_AND_BUILD_TIME
        value: "0.0.0.0"
      # NEXT_PUBLIC_* env vars are baked into the static JS bundle at BUILD
      # time, so the scope MUST include BUILD_TIME (RUN_TIME alone is a
      # no-op for Next.js). When this is not exactly the string "true",
      # GoogleSSOButton renders null and the "Sign in with Google" button
      # disappears from /login and /register. See PR #229 (L5.9).
      - key: NEXT_PUBLIC_GOOGLE_SSO_ENABLED
        scope: RUN_AND_BUILD_TIME
        value: "true"
      # Server-side (RSC) reach to the backend. Browser requests use the App
      # Platform ingress (relative URLs); server-side fetches must hit the
      # backend component via its private URL. RUN_TIME scope only — the
      # value isn't needed at build time and isn't resolvable then either.
      - key: BACKEND_INTERNAL_URL
        scope: RUN_TIME
        value: ${backend.PRIVATE_URL}
      # Turnstile widget site key. NEXT_PUBLIC_* envs are inlined into the
      # static JS bundle at build, so a key change requires a frontend
      # rebuild (`doctl apps update --spec` triggers it). Leave value
      # empty until the Cloudflare site is created — the widget render is
      # gated on both the backend's CAPTCHA_REQUIRED flag AND a non-empty
      # site key, so an empty value means no widget renders even if the
      # backend asks for one.
      - key: NEXT_PUBLIC_CAPTCHA_PROVIDER
        scope: RUN_AND_BUILD_TIME
        value: "turnstile"
      - key: NEXT_PUBLIC_CAPTCHA_SITE_KEY
        scope: RUN_AND_BUILD_TIME
        value: "0x4AAAAAADTu1HIFconXLShc"
      # Reports v2 frontend gate. SHIPPING AS "false" through PRs 1 to 3.
      # Frontend hides the Reports nav item and routes when this is not
      # exactly "true"; backend FEATURE_REPORTS_V2 above is the
      # load-bearing 404 gate. Flip both to "true" together in PR 4. See
      # specs/2026-05-22-reports-v2-flexible-canvas.md §11.
      - key: NEXT_PUBLIC_FEATURE_REPORTS_V2
        scope: RUN_AND_BUILD_TIME
        value: "true"

# Pre-deploy job: run Alembic migrations exactly once before any backend
# replica starts. This is the canonical "init container" pattern for App
# Platform — the new revision is held back until the job exits 0, so a
# long migration never causes the backend's serving probe to fail. The
# k8s/ Helm chart uses a matching initContainer in templates/backend.yaml.
#
# DATABASE_URL is bound here directly (App Platform does not auto-inherit
# secrets across components). Same encrypted reference the backend service
# uses above; same "safe to commit" reasoning.
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: fjcloudaiconsulting/tbd
      branch: main
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    instance_count: 1
    instance_size_slug: basic-xxs
    run_command: python /app/scripts/migrate.py
    envs:
      - key: APP_ENV
        scope: RUN_AND_BUILD_TIME
        value: "production"
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:PW7zpRXasYFhIiOoqMNopBxpqujwXZCO:LB8zQbjWAG4N99+0Q3m4fwakl3DTHqrPo9PH5r+JkSVSouY4n8pTl0ISC5FLVUBMPo92zTCxPIzGnfiKKbDEq5oxbKyM1g+jyVdUoXOBgogEWvJ84R5yvWC8SQVNQrdKsplwP2YScTPlpewRMw==]
      - key: JWT_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:yu+iyIxbSwoJpe7aEGuEBSJ8judQo26F:Ogb2sdGetlKniX5UaHeObIhPiYej4c4W1fccXr1By5mIGy1LI4dn8R6NPR1CGfnUAo5fslDt7qV48MNdMnGwk1A9qlp8GxCcKD2fdYcm7f8=]
