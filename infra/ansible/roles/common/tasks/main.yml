---
- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: safe
    cache_valid_time: 3600

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - python3-pymysql       # required by community.mysql modules
      - fail2ban
      - unattended-upgrades
      - apt-listchanges
      - curl
      - htop
      - vim
    state: present

- name: Set system timezone
  community.general.timezone:
    name: "{{ system_timezone }}"

# --- Unattended upgrades ---------------------------------------------------
# Minimal "yes please apply security updates" config. We don't auto-reboot;
# a reboot could disrupt MySQL replication or in-flight transactions.
- name: Enable unattended-upgrades (auto)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: "0644"

# --- Firewall --------------------------------------------------------------
# The DigitalOcean cloud firewall (pfv-data-fw) is the single source of truth
# for inbound rules. Layering ufw on top risks silent drops during VPC NAT
# translation (a TCP SYN can reach the droplet's VPC interface from a
# rewritten source that ufw's CIDR rule no longer matches). We disable ufw
# explicitly so this task is idempotent on existing droplets that already
# had ufw enabled by an older revision of this role.
- name: Check whether ufw is installed
  ansible.builtin.stat:
    path: /usr/sbin/ufw
  register: common_ufw_binary

- name: Disable ufw (rely solely on DO cloud firewall)
  community.general.ufw:
    state: disabled
  when: common_ufw_binary.stat.exists

# --- fail2ban --------------------------------------------------------------
- name: Configure fail2ban for sshd (jail.local)
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 1h
      findtime = 10m
      maxretry = 5

      [sshd]
      enabled = true
      port = ssh
      logpath = %(sshd_log)s
      backend = %(sshd_backend)s
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Ensure fail2ban is started and enabled
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

# --- Swap (1GB) ------------------------------------------------------------
# s-1vcpu-1gb has only 1GB RAM. Even a small swap keeps the OOM-killer at bay
# while MySQL warms its buffer pool.
- name: Check if swap file already exists
  ansible.builtin.stat:
    path: "{{ swap_file_path }}"
  register: swap_file_stat

- name: Allocate swap file
  ansible.builtin.command: "fallocate -l {{ swap_file_size_mb }}M {{ swap_file_path }}"
  when: not swap_file_stat.stat.exists
  changed_when: true

- name: Set swap file permissions
  ansible.builtin.file:
    path: "{{ swap_file_path }}"
    owner: root
    group: root
    mode: "0600"

- name: Format swap file
  ansible.builtin.command: "mkswap {{ swap_file_path }}"
  when: not swap_file_stat.stat.exists
  changed_when: true

- name: Enable swap file
  ansible.builtin.command: "swapon {{ swap_file_path }}"
  when: not swap_file_stat.stat.exists
  changed_when: true

- name: Persist swap in /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "{{ swap_file_path }} none swap sw 0 0"
    state: present

- name: Tune swappiness (low — favour RAM)
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "10"
    sysctl_set: true
    state: present
    reload: true

# --- MOTD ------------------------------------------------------------------
- name: Drop a descriptive /etc/motd
  ansible.builtin.copy:
    dest: /etc/motd
    content: |
      ============================================================
       pfv data droplet
       Role: MySQL + Redis (single node, VPC-only data plane)
       Managed by: Terraform (provisioning) + Ansible (config)
       Backups: weekly DO snapshots + nightly mysqldump (/var/backups/mysql)
      ============================================================
    owner: root
    group: root
    mode: "0644"
